<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contact Us - Foodie Delight</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <div class="brand">
      <h1>Foodie Delight</h1>
    </div>

    <!-- hamburger -->
    <button id="mobileNavToggle" class="hamburger" aria-label="Toggle Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <nav class="main-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="menu.html" class="nav-link">Menu</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-link">Register</a>
      <a href="admin.html" class="nav-link">Admin</a>
      <a href="#" id="cartLink" class="nav-link">Cart <span class="cart-count">0</span></a>
    </nav>
  </div>
</header>

<main class="contact-page container reveal">
  <div class="contact-header">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you!</p>
  </div>

  <div class="contact-form">
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" class="btn-primary">Send Message</button>
    </form>
  </div>

  <div class="contact-info">
    <div class="about-content">
      <h2>Get In Touch</h2>
      <p><i class="fas fa-map-marker-alt"></i> 123 Food Street, Yummy City</p>
      <p><i class="fas fa-phone"></i> (123) 456-7890</p>
      <p><i class="fas fa-envelope"></i> info@foodiedelight.com</p>

      <h2>Opening Hours</h2>
      <p>Monday - Friday: 10:00 AM - 10:00 PM</p>
      <p>Saturday - Sunday: 11:00 AM - 11:00 PM</p>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
