<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register - Foodie Delight</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="brand"><h1>Foodie Delight</h1></div>

    <button id="mobileNavToggle" class="hamburger">
      <span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span>
    </button>

    <nav class="main-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="menu.html" class="nav-link">Menu</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link">Contact</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-link active">Register</a>
      <a href="admin.html" class="nav-link">Admin</a>
      <a href="#" id="cartLink" class="nav-link">Cart <span class="cart-count">0</span></a>
    </nav>
  </div>
</header>

<main class="auth-wrapper">
  <div class="auth-card container reveal">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join Foodie Delight</p>
    </div>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input id="regName" type="text" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="regEmail" type="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="regPassword" type="password" required>
      </div>

      <div class="auth-actions">
        <button class="btn-primary">Register</button>
      </div>

      <p class="auth-small">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
